<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的記帳本</title>
<link rel="icon" type="image/png" href="icon-512.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="記帳本">
<meta name="theme-color" content="#c89968">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: linear-gradient(135deg, #fef3e2 0%, #fde8d4 100%);
    color: #4a3829;
    min-height: 100vh;
    padding: 16px;
  }
  .container { max-width: 720px; margin: 0 auto; }
  header { text-align: center; padding: 16px 0 20px; }
  header h1 { font-size: 26px; color: #8b5a2b; margin-bottom: 4px; }
  header p { color: #a07c54; font-size: 13px; }

  .card {
    background: #fff;
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 4px 14px rgba(139, 90, 43, 0.08);
  }

  /* banner */
  .banner {
    background: #fff5e7;
    border: 1px solid #f0d4a8;
    color: #8b5a2b;
    padding: 12px 14px;
    border-radius: 12px;
    margin-bottom: 12px;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .banner.warn { background: #fce4e4; border-color: #f0b8b8; color: #b04040; }
  .banner button {
    background: #fff;
    border: 1px solid currentColor;
    color: inherit;
    padding: 4px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
  }
  .banner .close {
    background: transparent;
    border: none;
    font-size: 18px;
    padding: 0 4px;
    color: inherit;
  }

  .month-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
    padding: 14px 18px;
    border-radius: 18px;
    margin-bottom: 14px;
    box-shadow: 0 4px 14px rgba(139, 90, 43, 0.08);
  }
  .month-bar button.nav-btn {
    background: #f5e6d3; border: none; width: 36px; height: 36px;
    border-radius: 50%; cursor: pointer; font-size: 18px; color: #8b5a2b;
  }
  .month-bar button.nav-btn:hover { background: #ecd5b8; }
  .month-bar .month-label { font-size: 18px; font-weight: 600; color: #8b5a2b; }
  .month-bar .settings-btn {
    background: #f5e6d3; border: none; padding: 8px 12px;
    border-radius: 10px; cursor: pointer; color: #8b5a2b; font-size: 14px;
    margin-left: 6px;
  }

  .summary {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px;
  }
  .summary .item {
    background: #fff; padding: 14px 10px; border-radius: 14px; text-align: center;
    box-shadow: 0 4px 14px rgba(139, 90, 43, 0.08);
  }
  .summary .label { font-size: 12px; color: #a07c54; margin-bottom: 4px; }
  .summary .value { font-size: 18px; font-weight: 700; }
  .income { color: #2d8659; }
  .expense { color: #c04848; }
  .balance.pos { color: #2d8659; }
  .balance.neg { color: #c04848; }

  .section-title {
    font-size: 15px; font-weight: 600; margin-bottom: 12px;
    color: #6b4a2b; display: flex; align-items: center; gap: 6px;
    justify-content: space-between;
  }
  .section-title .right { font-size: 12px; color: #a07c54; font-weight: 400; }

  /* form */
  .type-toggle {
    display: flex; background: #f5e6d3; border-radius: 10px; padding: 4px; margin-bottom: 12px;
  }
  .type-toggle button {
    flex: 1; border: none; padding: 8px; background: transparent; cursor: pointer;
    font-size: 14px; color: #8b5a2b; border-radius: 8px; font-weight: 500;
  }
  .type-toggle button.active {
    background: #fff; box-shadow: 0 2px 6px rgba(139,90,43,0.15); font-weight: 600;
  }

  .form-row { margin-bottom: 12px; }
  .form-row label {
    display: block; font-size: 12px; color: #a07c54; margin-bottom: 4px;
  }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%; padding: 10px 12px; border: 1px solid #ecd5b8; border-radius: 10px;
    font-size: 14px; font-family: inherit; background: #fdfaf5; color: #4a3829;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
    outline: none; border-color: #c89968;
  }

  .pay-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .pay-options button {
    padding: 10px; border: 1px solid #ecd5b8; background: #fdfaf5;
    border-radius: 10px; cursor: pointer; font-size: 13px; color: #6b4a2b;
  }
  .pay-options button.active {
    border-color: #c89968; background: #fff5e7; font-weight: 600;
  }

  .installment-box {
    background: #fff5e7; border-radius: 10px; padding: 10px 12px;
    margin-top: 8px; display: none;
  }
  .installment-box.show { display: block; }
  .installment-box .info { font-size: 12px; color: #8b5a2b; margin-top: 6px; }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .submit-btn {
    width: 100%; padding: 12px;
    background: linear-gradient(135deg, #c89968 0%, #a87a48 100%);
    color: #fff; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px;
  }
  .submit-btn:hover { opacity: 0.92; }

  /* records */
  .records { max-height: 480px; overflow-y: auto; }
  .record {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 4px; border-bottom: 1px dashed #f0e0c8;
  }
  .record:last-child { border-bottom: none; }
  .record .left { flex: 1; }
  .record .cat { font-size: 14px; font-weight: 600; color: #4a3829; margin-bottom: 2px; }
  .record .meta { font-size: 11px; color: #a07c54; }
  .record .amt { font-size: 15px; font-weight: 700; margin-left: 8px; }
  .record .del {
    background: transparent; border: none; color: #c08484;
    margin-left: 8px; cursor: pointer; font-size: 16px; padding: 4px 6px;
  }
  .badge {
    display: inline-block; padding: 2px 6px; border-radius: 4px;
    font-size: 10px; background: #f5e6d3; color: #8b5a2b; margin-right: 4px;
  }
  .badge.install { background: #ffe1c4; color: #b56a1e; }
  .badge.recurring { background: #e0f0e0; color: #2d8659; }

  .empty { text-align: center; padding: 30px 10px; color: #c0a585; font-size: 13px; }

  /* breakdown with budget */
  .breakdown-row {
    padding: 8px 0; font-size: 14px; color: #6b4a2b;
    border-bottom: 1px dashed #f0e0c8;
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-row .b-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 4px;
  }
  .breakdown-row .b-amt { font-weight: 600; }
  .progress-bar {
    height: 6px; background: #f5e6d3; border-radius: 3px; overflow: hidden;
    margin-top: 4px;
  }
  .progress-fill { height: 100%; background: #c89968; transition: width 0.3s; }
  .progress-fill.warn { background: #e8a050; }
  .progress-fill.over { background: #c04848; }
  .progress-text { font-size: 11px; color: #a07c54; margin-top: 2px; }
  .progress-text.over { color: #c04848; font-weight: 600; }

  /* chart */
  .chart-container {
    position: relative; height: 220px; margin-top: 8px;
  }
  .chart-tabs {
    display: flex; gap: 6px; margin-bottom: 8px;
  }
  .chart-tabs button {
    background: #f5e6d3; border: none; padding: 6px 12px;
    border-radius: 8px; cursor: pointer; font-size: 12px; color: #8b5a2b;
  }
  .chart-tabs button.active {
    background: #c89968; color: #fff; font-weight: 600;
  }
  .annual-summary {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    margin-top: 12px; padding-top: 12px; border-top: 1px dashed #f0e0c8;
  }
  .annual-summary .item { text-align: center; }
  .annual-summary .label { font-size: 11px; color: #a07c54; }
  .annual-summary .value { font-size: 15px; font-weight: 700; margin-top: 2px; }

  /* modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(74, 56, 41, 0.4);
    display: none; z-index: 100; padding: 20px;
    align-items: flex-start; justify-content: center; overflow-y: auto;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fef9f0; border-radius: 18px; max-width: 600px; width: 100%;
    margin: 20px auto; padding: 0; max-height: calc(100vh - 40px); overflow: hidden;
    display: flex; flex-direction: column;
  }
  .modal-header {
    padding: 16px 20px; border-bottom: 1px solid #f0e0c8;
    display: flex; justify-content: space-between; align-items: center;
    background: #fff;
  }
  .modal-header h2 { font-size: 18px; color: #8b5a2b; }
  .modal-header button {
    background: transparent; border: none; font-size: 22px;
    color: #8b5a2b; cursor: pointer;
  }
  .modal-tabs {
    display: flex; padding: 8px; background: #fff; gap: 4px;
    border-bottom: 1px solid #f0e0c8; overflow-x: auto;
  }
  .modal-tabs button {
    background: transparent; border: none; padding: 8px 12px;
    border-radius: 8px; cursor: pointer; color: #8b5a2b; font-size: 13px;
    white-space: nowrap;
  }
  .modal-tabs button.active {
    background: #c89968; color: #fff; font-weight: 600;
  }
  .modal-body {
    padding: 18px; overflow-y: auto; flex: 1;
  }
  .modal-pane { display: none; }
  .modal-pane.active { display: block; }

  /* category management */
  .cat-list {
    background: #fff; border-radius: 12px; padding: 8px;
    border: 1px solid #f0e0c8;
  }
  .cat-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px; border-radius: 8px; margin-bottom: 2px;
    background: #fdfaf5;
  }
  .cat-item:last-child { margin-bottom: 0; }
  .cat-item .name { font-size: 14px; color: #4a3829; flex: 1; }
  .cat-item .actions { display: flex; gap: 4px; }
  .cat-item button {
    background: transparent; border: none; padding: 4px 6px;
    cursor: pointer; color: #8b5a2b; font-size: 14px;
  }
  .cat-item button:hover { color: #c04848; }
  .cat-add-row {
    display: flex; gap: 6px; margin-top: 10px;
  }
  .cat-add-row input {
    flex: 1; padding: 8px 12px; border: 1px solid #ecd5b8;
    border-radius: 8px; font-size: 14px; background: #fdfaf5;
  }
  .cat-add-row button {
    background: #c89968; color: #fff; border: none;
    padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px;
  }

  /* budget */
  .budget-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px dashed #f0e0c8;
  }
  .budget-row .label { flex: 1; font-size: 14px; color: #4a3829; }
  .budget-row input {
    width: 120px; padding: 6px 10px; border: 1px solid #ecd5b8;
    border-radius: 8px; font-size: 14px; background: #fdfaf5; text-align: right;
  }

  /* recurring */
  .recurring-item {
    background: #fff; border-radius: 10px; padding: 12px;
    margin-bottom: 8px; border: 1px solid #f0e0c8;
  }
  .recurring-item .top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px;
  }
  .recurring-item .name { font-weight: 600; color: #4a3829; }
  .recurring-item .meta { font-size: 12px; color: #a07c54; }
  .recurring-item .actions {
    display: flex; gap: 6px;
  }
  .recurring-item .actions button {
    background: transparent; border: 1px solid #ecd5b8; padding: 4px 8px;
    border-radius: 6px; font-size: 12px; cursor: pointer; color: #8b5a2b;
  }

  .data-tools { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .data-tools button {
    flex: 1; min-width: 100px; padding: 9px; background: #f5e6d3; border: none;
    border-radius: 10px; color: #8b5a2b; cursor: pointer; font-size: 13px;
  }
  .data-tools button:hover { background: #ecd5b8; }
  .data-tools .danger { color: #c04848; background: #fce4e4; }
  .data-tools .danger:hover { background: #f5cfcf; }

  .info-text {
    font-size: 12px; color: #a07c54; line-height: 1.5; padding: 8px 0;
  }
  .info-text strong { color: #8b5a2b; }

  @media (max-width: 480px) {
    .summary .value { font-size: 16px; }
    .annual-summary .value { font-size: 13px; }
    .month-bar { padding: 12px 14px; }
    .month-bar .month-label { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>🐻 我的記帳本</h1>
    <p>記下每一筆，掌握收支平衡</p>
  </header>

  <!-- 提醒區 -->
  <div id="bannerArea"></div>

  <!-- 月份選擇 -->
  <div class="month-bar">
    <button class="nav-btn" id="prevMonth">‹</button>
    <div class="month-label" id="monthLabel">2026 / 05</div>
    <button class="nav-btn" id="nextMonth">›</button>
    <button class="settings-btn" id="openSettings">⚙️</button>
  </div>

  <!-- 月度總覽 -->
  <div class="summary">
    <div class="item">
      <div class="label">收入</div>
      <div class="value income" id="sumIncome">$0</div>
    </div>
    <div class="item">
      <div class="label">支出</div>
      <div class="value expense" id="sumExpense">$0</div>
    </div>
    <div class="item">
      <div class="label">結餘</div>
      <div class="value balance" id="sumBalance">$0</div>
    </div>
  </div>

  <!-- 圖表 -->
  <div class="card">
    <div class="section-title">📊 趨勢圖表</div>
    <div class="chart-tabs">
      <button class="active" data-chart="monthly">近 12 個月</button>
      <button data-chart="annual">年度總覽</button>
    </div>
    <div class="chart-container">
      <canvas id="trendChart"></canvas>
    </div>
    <div class="annual-summary" id="annualSummary"></div>
  </div>

  <!-- 新增記帳 -->
  <div class="card">
    <div class="section-title">✏️ 新增一筆</div>

    <div class="type-toggle">
      <button id="btnExpense" class="active" data-type="expense">支出</button>
      <button id="btnIncome" data-type="income">收入</button>
    </div>

    <div class="row-2">
      <div class="form-row">
        <label>金額</label>
        <input type="number" id="amount" placeholder="0" min="0" step="1">
      </div>
      <div class="form-row">
        <label>日期</label>
        <input type="date" id="date">
      </div>
    </div>

    <div class="form-row">
      <label>類別</label>
      <select id="category"></select>
    </div>

    <div class="form-row" id="payMethodRow">
      <label>支付方式</label>
      <div class="pay-options">
        <button data-pay="cash" class="active">💵 現金</button>
        <button data-pay="mobile">📱 行動支付</button>
        <button data-pay="credit">💳 信用卡</button>
      </div>

      <div class="installment-box" id="installmentBox">
        <div class="row-2">
          <div class="form-row" style="margin-bottom:0">
            <label>分攤期數</label>
            <select id="installment">
              <option value="1">不分攤(一次計入)</option>
              <option value="2">分 2 期</option>
              <option value="3">分 3 期</option>
              <option value="6">分 6 期</option>
              <option value="12">分 12 期</option>
              <option value="24">分 24 期</option>
            </select>
          </div>
          <div class="form-row" style="margin-bottom:0">
            <label>每期金額</label>
            <input type="text" id="perMonth" disabled value="$0">
          </div>
        </div>
        <div class="form-row" style="margin-top:8px; margin-bottom:0" id="directionRow">
          <label>攤提方向</label>
          <div class="pay-options" style="grid-template-columns: 1fr 1fr">
            <button type="button" data-dir="forward" class="active">→ 未來（信用卡分期、預付會員）</button>
            <button type="button" data-dir="backward">← 過去（電信費、後付帳單）</button>
          </div>
        </div>
        <div class="info" id="installmentInfo"></div>
      </div>
    </div>

    <div class="form-row">
      <label>備註 (選填)</label>
      <input type="text" id="note" placeholder="e.g. 午餐 / 加油 / 訂閱費">
    </div>

    <button class="submit-btn" id="saveBtn">儲存</button>
  </div>

  <!-- 本月明細 -->
  <div class="card">
    <div class="section-title">
      <span>📋 本月明細</span>
      <span class="right" id="recordsCount"></span>
    </div>
    <div class="records" id="records"></div>
  </div>

  <!-- 支出分類統計 + 預算 -->
  <div class="card">
    <div class="section-title">📊 支出分類 / 預算</div>
    <div id="breakdown"></div>
  </div>

</div>

<!-- ===== 設定 Modal ===== -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <h2>⚙️ 設定</h2>
      <button id="closeSettings">×</button>
    </div>
    <div class="modal-tabs">
      <button class="active" data-tab="backup">💾 備份</button>
      <button data-tab="budget">💰 預算</button>
      <button data-tab="category">🏷️ 類別</button>
      <button data-tab="recurring">🔁 固定支出</button>
    </div>
    <div class="modal-body">

      <!-- 備份 -->
      <div class="modal-pane active" id="pane-backup">
        <div class="info-text">
          資料只存在你這個瀏覽器，<strong>建議每月匯出一次備份</strong>到雲端（iCloud / Google Drive）。
        </div>
        <div id="lastBackupInfo" style="padding:8px 0; font-size:13px; color:#6b4a2b;"></div>
        <div class="data-tools">
          <button id="exportBtn">📤 匯出 JSON</button>
          <button id="importBtn">📥 匯入 JSON</button>
          <button id="clearBtn" class="danger">🗑️ 清空全部</button>
        </div>
        <input type="file" id="importFile" accept=".json" style="display:none">
      </div>

      <!-- 預算 -->
      <div class="modal-pane" id="pane-budget">
        <div class="info-text">
          設定每個類別的<strong>每月預算上限</strong>。超出時主畫面會出現紅色警告。空白＝不設限。
        </div>
        <div id="budgetList"></div>
      </div>

      <!-- 類別 -->
      <div class="modal-pane" id="pane-category">
        <div class="type-toggle" style="margin-bottom:14px">
          <button class="active" data-cattype="expense">支出類別</button>
          <button data-cattype="income">收入類別</button>
        </div>
        <div class="info-text">↑ 上下箭頭可調順序，🗑️ 刪除。已使用該類別的紀錄不會自動更新。</div>
        <div class="cat-list" id="catList"></div>
        <div class="cat-add-row">
          <input type="text" id="newCatName" placeholder="新類別名稱">
          <button id="addCatBtn">新增</button>
        </div>
      </div>

      <!-- 固定支出 -->
      <div class="modal-pane" id="pane-recurring">
        <div class="info-text">
          設定<strong>每月固定支出</strong>（如房租、訂閱），系統會自動每月幫你記一筆。設定後過去到現在所有月份都會補上記錄。
        </div>
        <div id="recurringList"></div>
        <div style="margin-top:14px">
          <button class="submit-btn" id="addRecurringBtn">+ 新增固定支出</button>
        </div>
        <!-- 編輯表單 -->
        <div id="recurringForm" style="display:none; margin-top:14px; padding:14px; background:#fff; border-radius:12px; border:1px solid #f0e0c8">
          <div class="form-row">
            <label>名稱</label>
            <input type="text" id="rec-name" placeholder="如：房租、Netflix">
          </div>
          <div class="row-2">
            <div class="form-row">
              <label>金額</label>
              <input type="number" id="rec-amount" placeholder="0">
            </div>
            <div class="form-row">
              <label>每月幾號扣款</label>
              <input type="number" id="rec-day" min="1" max="28" value="1">
            </div>
          </div>
          <div class="row-2">
            <div class="form-row">
              <label>類別</label>
              <select id="rec-category"></select>
            </div>
            <div class="form-row">
              <label>支付方式</label>
              <select id="rec-pay">
                <option value="cash">💵 現金</option>
                <option value="mobile">📱 行動支付</option>
                <option value="credit">💳 信用卡</option>
              </select>
            </div>
          </div>
          <div class="row-2">
            <div class="form-row">
              <label>從哪個月開始 (YYYY-MM)</label>
              <input type="month" id="rec-start">
            </div>
            <div class="form-row">
              <label>到哪個月止 (留空＝一直)</label>
              <input type="month" id="rec-end">
            </div>
          </div>
          <div class="data-tools">
            <button id="saveRecurringBtn" style="background:#c89968;color:#fff">儲存</button>
            <button id="cancelRecurringBtn">取消</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// =========================================
// 資料初始化 + 設定
// =========================================
const DEFAULT_CATEGORIES = {
  expense: ['飲食', '交通', '購物', '娛樂', '居住', '醫療', '教育', '人情', '其他'],
  income: ['薪資', '獎金', '投資', '副業', '其他收入']
};

let records = JSON.parse(localStorage.getItem('bk_records') || '[]');
let settings = JSON.parse(localStorage.getItem('bk_settings') || 'null');
let recurring = JSON.parse(localStorage.getItem('bk_recurring') || '[]');
let skipped = JSON.parse(localStorage.getItem('bk_skipped') || '[]');
let bannerDismissed = JSON.parse(localStorage.getItem('bk_bannerDismissed') || '{}');

// 初次使用 / 升級資料結構
if (!settings) {
  settings = {
    categories: JSON.parse(JSON.stringify(DEFAULT_CATEGORIES)),
    budgets: {},
    lastExport: null
  };
  saveSettings();
}
if (!settings.categories) settings.categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
if (!settings.budgets) settings.budgets = {};

function save() { localStorage.setItem('bk_records', JSON.stringify(records)); }
function saveSettings() { localStorage.setItem('bk_settings', JSON.stringify(settings)); }
function saveRecurring() { localStorage.setItem('bk_recurring', JSON.stringify(recurring)); }
function saveSkipped() { localStorage.setItem('bk_skipped', JSON.stringify(skipped)); }
function saveBannerDismissed() { localStorage.setItem('bk_bannerDismissed', JSON.stringify(bannerDismissed)); }

function formatMoney(n) { return '$' + Math.round(n).toLocaleString(); }
function pad(n) { return String(n).padStart(2, '0'); }
function ymKey(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1); }
function uid() { return Date.now() + '-' + Math.random().toString(36).slice(2, 8); }

let currentDate = new Date();
let currentType = 'expense';
let currentPay = 'cash';
let currentChartTab = 'monthly';
let currentCatType = 'expense';
let trendChart = null;
let editingRecurringId = null;

// =========================================
// 固定支出 -> 自動生成記錄
// =========================================
function applyRecurring() {
  const today = new Date();
  const todayYM = ymKey(today);

  recurring.forEach(t => {
    if (!t.startMonth) return;
    const [sy, sm] = t.startMonth.split('-').map(Number);
    const start = new Date(sy, sm - 1, 1);

    let end;
    if (t.endMonth) {
      const [ey, em] = t.endMonth.split('-').map(Number);
      end = new Date(ey, em - 1, 1);
    } else {
      end = new Date(today.getFullYear(), today.getMonth(), 1);
    }

    const cur = new Date(start);
    while (cur <= end) {
      const ymStr = ymKey(cur);
      const skipKey = `${t.id}-${ymStr}`;
      if (skipped.includes(skipKey)) {
        cur.setMonth(cur.getMonth() + 1);
        continue;
      }
      // 檢查該月是否已有此固定支出的記錄
      const has = records.some(r => r.recurringId === t.id && r.date.startsWith(ymStr));
      if (!has) {
        const day = Math.min(t.day || 1, 28);
        records.push({
          id: uid(),
          recurringId: t.id,
          type: 'expense',
          amount: t.amount,
          date: `${ymStr}-${pad(day)}`,
          category: t.category,
          note: t.name,
          pay: t.pay || 'cash',
          installment: 1
        });
      }
      cur.setMonth(cur.getMonth() + 1);
    }
  });
  save();
}

// =========================================
// 月份切換
// =========================================
function updateMonthLabel() {
  document.getElementById('monthLabel').textContent =
    currentDate.getFullYear() + ' / ' + pad(currentDate.getMonth() + 1);
  render();
}
document.getElementById('prevMonth').onclick = () => {
  currentDate.setMonth(currentDate.getMonth() - 1);
  updateMonthLabel();
};
document.getElementById('nextMonth').onclick = () => {
  currentDate.setMonth(currentDate.getMonth() + 1);
  updateMonthLabel();
};

// =========================================
// 類型 / 支付方式切換
// =========================================
document.querySelectorAll('.type-toggle button[data-type]').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.type-toggle button[data-type]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentType = b.dataset.type;
    populateCategorySelect();
    document.getElementById('payMethodRow').style.display = currentType === 'expense' ? '' : 'none';
    // 支出時永遠顯示分期/攤提選項(不限信用卡)
    document.getElementById('installmentBox').classList.toggle('show', currentType === 'expense');
  };
});

document.querySelectorAll('.pay-options button[data-pay]').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.pay-options button[data-pay]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentPay = b.dataset.pay;
    updateInstallment();
  };
});

// 攤提方向切換
let currentDirection = 'forward';
document.querySelectorAll('button[data-dir]').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('button[data-dir]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentDirection = b.dataset.dir;
    updateInstallment();
  };
});

function updateInstallment() {
  const amt = parseFloat(document.getElementById('amount').value) || 0;
  const m = parseInt(document.getElementById('installment').value) || 1;
  const per = amt / m;
  document.getElementById('perMonth').value = formatMoney(per);
  const info = document.getElementById('installmentInfo');
  // 攤提方向只在分期 >= 2 時才顯示
  document.getElementById('directionRow').style.display = m > 1 ? '' : 'none';
  if (m > 1 && amt > 0) {
    const dirText = currentDirection === 'forward'
      ? `本月開始連續 ${m} 個月`
      : `本月之前 ${m} 個月`;
    info.textContent = `攤提至「${dirText}」，每月計入 ${formatMoney(per)}`;
  } else {
    info.textContent = '';
  }
}
document.getElementById('amount').addEventListener('input', updateInstallment);
document.getElementById('installment').addEventListener('change', updateInstallment);

function populateCategorySelect() {
  const sel = document.getElementById('category');
  const cats = settings.categories[currentType];
  sel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
}

// =========================================
// 儲存記錄
// =========================================
document.getElementById('saveBtn').onclick = () => {
  const amt = parseFloat(document.getElementById('amount').value);
  const date = document.getElementById('date').value;
  if (!amt || amt <= 0) return alert('請輸入金額');
  if (!date) return alert('請選擇日期');

  records.push({
    id: uid(),
    type: currentType,
    amount: amt,
    date: date,
    category: document.getElementById('category').value,
    note: document.getElementById('note').value.trim(),
    pay: currentType === 'expense' ? currentPay : null,
    installment: currentType === 'expense'
      ? parseInt(document.getElementById('installment').value) : 1,
    direction: currentType === 'expense' ? currentDirection : 'forward'
  });
  save();
  document.getElementById('amount').value = '';
  document.getElementById('note').value = '';
  document.getElementById('installment').value = '1';
  // 還原方向為預設 forward
  document.querySelectorAll('button[data-dir]').forEach(x => x.classList.remove('active'));
  document.querySelector('button[data-dir="forward"]').classList.add('active');
  currentDirection = 'forward';
  updateInstallment();
  render();
};

// =========================================
// 計算每月攤提 (含分期 + 固定支出)
// =========================================
function getMonthlyImpact(r, targetDate) {
  const recDate = new Date(r.date);
  const target = new Date(targetDate.getFullYear(), targetDate.getMonth(), 1);
  const startMonth = new Date(recDate.getFullYear(), recDate.getMonth(), 1);
  const monthDiff = (target.getFullYear() - startMonth.getFullYear()) * 12 +
                    (target.getMonth() - startMonth.getMonth());

  if (r.type === 'expense' && r.installment > 1) {
    if (r.direction === 'backward') {
      // 向過去攤提: 紀錄月的前 N 個月(不含紀錄月)
      return (monthDiff >= -r.installment && monthDiff <= -1) ? r.amount / r.installment : 0;
    }
    // 向未來攤提(預設): 紀錄月起連續 N 個月
    return (monthDiff >= 0 && monthDiff < r.installment) ? r.amount / r.installment : 0;
  }
  return monthDiff === 0 ? r.amount : 0;
}

function getMonthData(date) {
  let income = 0, expense = 0;
  const breakdown = {};
  records.forEach(r => {
    const impact = getMonthlyImpact(r, date);
    if (impact > 0) {
      if (r.type === 'income') income += impact;
      else {
        expense += impact;
        breakdown[r.category] = (breakdown[r.category] || 0) + impact;
      }
    }
  });
  return { income, expense, breakdown };
}

// =========================================
// 主畫面渲染
// =========================================
function render() {
  const yKey = currentDate.getFullYear();
  const mKey = currentDate.getMonth();
  const { income, expense, breakdown } = getMonthData(currentDate);

  document.getElementById('sumIncome').textContent = formatMoney(income);
  document.getElementById('sumExpense').textContent = formatMoney(expense);
  const bal = income - expense;
  const balEl = document.getElementById('sumBalance');
  balEl.textContent = formatMoney(bal);
  balEl.className = 'value balance ' + (bal >= 0 ? 'pos' : 'neg');

  // 本月明細
  const monthItems = records.filter(r => {
    const d = new Date(r.date);
    return d.getFullYear() === yKey && d.getMonth() === mKey;
  }).sort((a, b) => b.date.localeCompare(a.date));

  document.getElementById('recordsCount').textContent = `共 ${monthItems.length} 筆`;

  const list = document.getElementById('records');
  if (monthItems.length === 0) {
    list.innerHTML = '<div class="empty">本月還沒有任何紀錄 🌱</div>';
  } else {
    const payMap = { cash: '💵 現金', mobile: '📱 行動支付', credit: '💳 信用卡' };
    list.innerHTML = monthItems.map(r => {
      const payBadge = r.type === 'expense' ? `<span class="badge">${payMap[r.pay] || ''}</span>` : '';
      const installBadge = r.installment > 1
        ? `<span class="badge install">分${r.installment}期${r.direction === 'backward' ? '←過去' : ''}</span>`
        : '';
      const recBadge = r.recurringId ? `<span class="badge recurring">🔁 固定</span>` : '';
      const sign = r.type === 'income' ? '+' : '-';
      const color = r.type === 'income' ? 'income' : 'expense';
      const noteText = r.note ? ` · ${r.note}` : '';
      return `
        <div class="record">
          <div class="left">
            <div class="cat">${r.category}</div>
            <div class="meta">${r.date}${noteText}<br>${payBadge}${installBadge}${recBadge}</div>
          </div>
          <div class="amt ${color}">${sign}${formatMoney(r.amount)}</div>
          <button class="del" data-id="${r.id}" data-rec="${r.recurringId || ''}" title="刪除">✕</button>
        </div>`;
    }).join('');
    list.querySelectorAll('.del').forEach(btn => {
      btn.onclick = () => {
        const r = records.find(x => x.id === btn.dataset.id);
        if (!confirm('確定要刪除這筆記錄嗎？')) return;
        if (r.recurringId) {
          // 加入 skipped 不讓它自動補回
          skipped.push(`${r.recurringId}-${r.date.slice(0,7)}`);
          saveSkipped();
        }
        records = records.filter(x => x.id !== btn.dataset.id);
        save();
        render();
      };
    });
  }

  // 預算 / 分類統計
  renderBreakdown(breakdown);

  // 提醒 banner
  renderBanners(breakdown);

  // 圖表
  renderChart();
}

function renderBreakdown(breakdown) {
  const bd = document.getElementById('breakdown');
  const cats = Object.entries(breakdown).sort((a, b) => b[1] - a[1]);
  // 也加上有設預算但本月未消費的類別
  Object.keys(settings.budgets).forEach(c => {
    if (!cats.find(x => x[0] === c) && settings.budgets[c] > 0) {
      cats.push([c, 0]);
    }
  });

  if (cats.length === 0) {
    bd.innerHTML = '<div class="empty">本月還沒有支出</div>';
    return;
  }
  const total = cats.reduce((s, [, v]) => s + v, 0) || 1;
  bd.innerHTML = cats.map(([c, v]) => {
    const pct = (v / total * 100).toFixed(1);
    const budget = settings.budgets[c] || 0;
    let progressHtml = '';
    if (budget > 0) {
      const used = (v / budget * 100);
      const usedClamp = Math.min(used, 100);
      let cls = '';
      if (used >= 100) cls = 'over';
      else if (used >= 80) cls = 'warn';
      progressHtml = `
        <div class="progress-bar"><div class="progress-fill ${cls}" style="width:${usedClamp}%"></div></div>
        <div class="progress-text ${used >= 100 ? 'over' : ''}">
          預算 ${formatMoney(budget)} · 已用 ${used.toFixed(0)}% ${used >= 100 ? '⚠️ 超出' : ''}
        </div>`;
    }
    return `<div class="breakdown-row">
      <div class="b-top">
        <span>${c} <span style="color:#b59574;font-size:12px">(${pct}%)</span></span>
        <span class="b-amt expense">${formatMoney(v)}</span>
      </div>
      ${progressHtml}
    </div>`;
  }).join('');
}

// =========================================
// 提醒 banner（備份提醒 + 預算超出）
// =========================================
function renderBanners(breakdown) {
  const area = document.getElementById('bannerArea');
  const banners = [];

  // 備份提醒
  const lastExp = settings.lastExport;
  const daysAgo = lastExp ? Math.floor((Date.now() - lastExp) / 86400000) : 999;
  const today = new Date().toISOString().slice(0, 10);
  if (daysAgo >= 30 && bannerDismissed.backup !== today) {
    const text = lastExp
      ? `距離上次匯出備份已經 ${daysAgo} 天了，記得備份避免資料遺失。`
      : '你還沒備份過資料，建議先匯出一份到雲端保險一下。';
    banners.push(`
      <div class="banner">
        <span>💾 ${text}</span>
        <div>
          <button onclick="document.getElementById('openSettings').click()">立即備份</button>
          <button class="close" onclick="dismissBanner('backup')">×</button>
        </div>
      </div>`);
  }

  // 預算超出
  const over = [];
  Object.entries(breakdown).forEach(([c, v]) => {
    const b = settings.budgets[c];
    if (b > 0 && v > b) over.push(`${c} 已用 ${formatMoney(v)}/${formatMoney(b)}`);
  });
  if (over.length > 0 && bannerDismissed.budget !== ymKey(currentDate)) {
    banners.push(`
      <div class="banner warn">
        <span>⚠️ 本月有 ${over.length} 個類別超出預算：${over.join('、')}</span>
        <button class="close" onclick="dismissBanner('budget')">×</button>
      </div>`);
  }

  area.innerHTML = banners.join('');
}

window.dismissBanner = (key) => {
  if (key === 'backup') bannerDismissed.backup = new Date().toISOString().slice(0, 10);
  if (key === 'budget') bannerDismissed.budget = ymKey(currentDate);
  saveBannerDismissed();
  render();
};

// =========================================
// 圖表
// =========================================
document.querySelectorAll('.chart-tabs button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.chart-tabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentChartTab = b.dataset.chart;
    renderChart();
  };
});

function renderChart() {
  const canvas = document.getElementById('trendChart');
  if (trendChart) trendChart.destroy();

  if (currentChartTab === 'monthly') {
    // 近 12 個月
    const months = [];
    const incomes = [], expenses = [], balances = [];
    for (let i = 11; i >= 0; i--) {
      const d = new Date(currentDate.getFullYear(), currentDate.getMonth() - i, 1);
      const data = getMonthData(d);
      months.push(`${d.getFullYear().toString().slice(2)}/${pad(d.getMonth() + 1)}`);
      incomes.push(Math.round(data.income));
      expenses.push(Math.round(data.expense));
      balances.push(Math.round(data.income - data.expense));
    }
    trendChart = new Chart(canvas, {
      type: 'line',
      data: {
        labels: months,
        datasets: [
          { label: '收入', data: incomes, borderColor: '#2d8659', backgroundColor: 'rgba(45,134,89,0.1)', tension: 0.3 },
          { label: '支出', data: expenses, borderColor: '#c04848', backgroundColor: 'rgba(192,72,72,0.1)', tension: 0.3 },
          { label: '結餘', data: balances, borderColor: '#c89968', backgroundColor: 'rgba(200,153,104,0.15)', tension: 0.3, fill: true }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { boxWidth: 12, font: { size: 11 } } } },
        scales: { y: { ticks: { font: { size: 10 } } }, x: { ticks: { font: { size: 10 } } } }
      }
    });
    document.getElementById('annualSummary').innerHTML = '';
  } else {
    // 年度總覽
    const year = currentDate.getFullYear();
    const months = [];
    const incomes = [], expenses = [];
    let yearIncome = 0, yearExpense = 0;
    for (let m = 0; m < 12; m++) {
      const d = new Date(year, m, 1);
      const data = getMonthData(d);
      months.push(`${m + 1}月`);
      incomes.push(Math.round(data.income));
      expenses.push(Math.round(data.expense));
      yearIncome += data.income;
      yearExpense += data.expense;
    }
    trendChart = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: months,
        datasets: [
          { label: '收入', data: incomes, backgroundColor: '#7ab896' },
          { label: '支出', data: expenses, backgroundColor: '#d68888' }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { boxWidth: 12, font: { size: 11 } } } },
        scales: { y: { ticks: { font: { size: 10 } } }, x: { ticks: { font: { size: 10 } } } }
      }
    });
    const balanceClass = yearIncome - yearExpense >= 0 ? 'income' : 'expense';
    document.getElementById('annualSummary').innerHTML = `
      <div class="item"><div class="label">${year} 收入</div><div class="value income">${formatMoney(yearIncome)}</div></div>
      <div class="item"><div class="label">${year} 支出</div><div class="value expense">${formatMoney(yearExpense)}</div></div>
      <div class="item"><div class="label">${year} 結餘</div><div class="value ${balanceClass}">${formatMoney(yearIncome - yearExpense)}</div></div>
    `;
  }
}

// =========================================
// Settings Modal
// =========================================
const modal = document.getElementById('settingsModal');
document.getElementById('openSettings').onclick = () => {
  modal.classList.add('show');
  renderBackupPane();
  renderBudgetPane();
  renderCategoryPane();
  renderRecurringPane();
};
document.getElementById('closeSettings').onclick = () => modal.classList.remove('show');
modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('show'); };

document.querySelectorAll('.modal-tabs button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.modal-tabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.querySelectorAll('.modal-pane').forEach(p => p.classList.remove('active'));
    document.getElementById('pane-' + b.dataset.tab).classList.add('active');
  };
});

// ----- 備份 pane -----
function renderBackupPane() {
  const info = document.getElementById('lastBackupInfo');
  if (settings.lastExport) {
    const d = new Date(settings.lastExport);
    const days = Math.floor((Date.now() - settings.lastExport) / 86400000);
    info.innerHTML = `📅 上次備份：${d.toISOString().slice(0,10)}（${days} 天前）`;
  } else {
    info.innerHTML = '⚠️ 還沒做過備份';
  }
}

document.getElementById('exportBtn').onclick = () => {
  const payload = { records, settings, recurring, skipped, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `bookkeeping-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  settings.lastExport = Date.now();
  saveSettings();
  renderBackupPane();
  render();
};

document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
document.getElementById('importFile').onchange = (e) => {
  const f = e.target.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      // 支援兩種格式:純陣列(舊版) 或 物件(新版)
      let importedRecords = Array.isArray(data) ? data : data.records;
      if (!Array.isArray(importedRecords)) throw 0;
      if (!confirm(`匯入 ${importedRecords.length} 筆資料？將與現有資料合併。`)) return;
      records = records.concat(importedRecords);
      // 如果是新版,順便匯入 settings/recurring(合併)
      if (data.recurring && Array.isArray(data.recurring)) {
        data.recurring.forEach(r => {
          if (!recurring.find(x => x.id === r.id)) recurring.push(r);
        });
        saveRecurring();
      }
      if (data.skipped && Array.isArray(data.skipped)) {
        skipped = [...new Set([...skipped, ...data.skipped])];
        saveSkipped();
      }
      save();
      alert('匯入完成！');
      render();
      renderBackupPane();
    } catch { alert('檔案格式錯誤'); }
  };
  reader.readAsText(f);
  e.target.value = '';
};

document.getElementById('clearBtn').onclick = () => {
  if (!confirm('確定要清空所有交易記錄嗎？此動作不可復原。\n(類別、預算、固定支出設定會保留)')) return;
  records = [];
  save();
  render();
};

// ----- 預算 pane -----
function renderBudgetPane() {
  const list = document.getElementById('budgetList');
  const cats = settings.categories.expense;
  list.innerHTML = cats.map(c => {
    const b = settings.budgets[c] || '';
    return `<div class="budget-row">
      <span class="label">${c}</span>
      <input type="number" data-cat="${c}" placeholder="不設限" value="${b}" min="0">
      <span style="font-size:12px;color:#a07c54">/月</span>
    </div>`;
  }).join('');
  list.querySelectorAll('input').forEach(inp => {
    inp.onchange = () => {
      const v = parseFloat(inp.value);
      if (v > 0) settings.budgets[inp.dataset.cat] = v;
      else delete settings.budgets[inp.dataset.cat];
      saveSettings();
      render();
    };
  });
}

// ----- 類別 pane -----
document.querySelectorAll('.modal-pane#pane-category .type-toggle button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.modal-pane#pane-category .type-toggle button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentCatType = b.dataset.cattype;
    renderCategoryPane();
  };
});

function renderCategoryPane() {
  const list = document.getElementById('catList');
  const cats = settings.categories[currentCatType];
  list.innerHTML = cats.map((c, i) => `
    <div class="cat-item">
      <span class="name">${c}</span>
      <div class="actions">
        <button onclick="moveCat(${i}, -1)" ${i === 0 ? 'disabled style="opacity:0.3"' : ''}>↑</button>
        <button onclick="moveCat(${i}, 1)" ${i === cats.length - 1 ? 'disabled style="opacity:0.3"' : ''}>↓</button>
        <button onclick="deleteCat(${i})" title="刪除">🗑️</button>
      </div>
    </div>`).join('');
}

window.moveCat = (i, dir) => {
  const cats = settings.categories[currentCatType];
  const j = i + dir;
  if (j < 0 || j >= cats.length) return;
  [cats[i], cats[j]] = [cats[j], cats[i]];
  saveSettings();
  renderCategoryPane();
  populateCategorySelect();
};

window.deleteCat = (i) => {
  const cats = settings.categories[currentCatType];
  const name = cats[i];
  if (cats.length <= 1) return alert('至少要保留一個類別');
  if (!confirm(`確定刪除「${name}」？\n已使用此類別的紀錄不會自動更新。`)) return;
  cats.splice(i, 1);
  saveSettings();
  renderCategoryPane();
  populateCategorySelect();
  renderBudgetPane();
};

document.getElementById('addCatBtn').onclick = () => {
  const input = document.getElementById('newCatName');
  const name = input.value.trim();
  if (!name) return;
  const cats = settings.categories[currentCatType];
  if (cats.includes(name)) return alert('此類別已存在');
  cats.push(name);
  saveSettings();
  input.value = '';
  renderCategoryPane();
  populateCategorySelect();
  renderBudgetPane();
};
document.getElementById('newCatName').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('addCatBtn').click();
});

// ----- 固定支出 pane -----
function renderRecurringPane() {
  const list = document.getElementById('recurringList');
  if (recurring.length === 0) {
    list.innerHTML = '<div class="empty">還沒設定任何固定支出</div>';
  } else {
    const payMap = { cash: '💵', mobile: '📱', credit: '💳' };
    list.innerHTML = recurring.map(t => `
      <div class="recurring-item">
        <div class="top">
          <div>
            <div class="name">${t.name}</div>
            <div class="meta">每月 ${t.day} 號 · ${formatMoney(t.amount)} · ${t.category} · ${payMap[t.pay] || ''}</div>
            <div class="meta">${t.startMonth}${t.endMonth ? ` ~ ${t.endMonth}` : ' 起一直進行'}</div>
          </div>
          <div class="actions">
            <button onclick="editRecurring('${t.id}')">編輯</button>
            <button onclick="deleteRecurring('${t.id}')" style="color:#c04848">刪除</button>
          </div>
        </div>
      </div>`).join('');
  }
  // 類別下拉
  const sel = document.getElementById('rec-category');
  sel.innerHTML = settings.categories.expense.map(c => `<option value="${c}">${c}</option>`).join('');
}

document.getElementById('addRecurringBtn').onclick = () => {
  editingRecurringId = null;
  document.getElementById('rec-name').value = '';
  document.getElementById('rec-amount').value = '';
  document.getElementById('rec-day').value = '1';
  document.getElementById('rec-category').value = settings.categories.expense[0];
  document.getElementById('rec-pay').value = 'cash';
  document.getElementById('rec-start').value = ymKey(new Date());
  document.getElementById('rec-end').value = '';
  document.getElementById('recurringForm').style.display = 'block';
};

window.editRecurring = (id) => {
  const t = recurring.find(x => x.id === id);
  if (!t) return;
  editingRecurringId = id;
  document.getElementById('rec-name').value = t.name;
  document.getElementById('rec-amount').value = t.amount;
  document.getElementById('rec-day').value = t.day;
  document.getElementById('rec-category').value = t.category;
  document.getElementById('rec-pay').value = t.pay;
  document.getElementById('rec-start').value = t.startMonth;
  document.getElementById('rec-end').value = t.endMonth || '';
  document.getElementById('recurringForm').style.display = 'block';
};

window.deleteRecurring = (id) => {
  if (!confirm('刪除此固定支出？\n已產生的記錄會保留，未來不再自動新增。')) return;
  recurring = recurring.filter(t => t.id !== id);
  saveRecurring();
  renderRecurringPane();
};

document.getElementById('saveRecurringBtn').onclick = () => {
  const name = document.getElementById('rec-name').value.trim();
  const amount = parseFloat(document.getElementById('rec-amount').value);
  const day = parseInt(document.getElementById('rec-day').value);
  const category = document.getElementById('rec-category').value;
  const pay = document.getElementById('rec-pay').value;
  const startMonth = document.getElementById('rec-start').value;
  const endMonth = document.getElementById('rec-end').value || null;

  if (!name) return alert('請輸入名稱');
  if (!amount || amount <= 0) return alert('請輸入金額');
  if (!startMonth) return alert('請選擇開始月份');

  if (editingRecurringId) {
    const t = recurring.find(x => x.id === editingRecurringId);
    Object.assign(t, { name, amount, day, category, pay, startMonth, endMonth });
  } else {
    recurring.push({ id: uid(), name, amount, day, category, pay, startMonth, endMonth });
  }
  saveRecurring();
  applyRecurring();
  document.getElementById('recurringForm').style.display = 'none';
  renderRecurringPane();
  render();
};

document.getElementById('cancelRecurringBtn').onclick = () => {
  document.getElementById('recurringForm').style.display = 'none';
};

// =========================================
// 初始化
// =========================================
document.getElementById('date').value = new Date().toISOString().slice(0, 10);
populateCategorySelect();
document.getElementById('installmentBox').classList.add('show'); // 預設 expense,顯示攤提選項
updateInstallment(); // 初始化方向顯示
applyRecurring();
updateMonthLabel();
</script>
</body>
</html>
