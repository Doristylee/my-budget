<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的記帳本</title>
<!-- 瀏覽器分頁圖示 -->
<link rel="icon" type="image/png" href="icon-512.png">
<!-- iPhone 加入主畫面的圖示 -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<!-- iOS 加入主畫面時的設定 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="記帳本">
<!-- Android Chrome 主題色 -->
<meta name="theme-color" content="#c89968">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: linear-gradient(135deg, #fef3e2 0%, #fde8d4 100%);
    color: #4a3829;
    min-height: 100vh;
    padding: 16px;
  }
  .container { max-width: 720px; margin: 0 auto; }
  header {
    text-align: center;
    padding: 16px 0 24px;
  }
  header h1 {
    font-size: 26px;
    color: #8b5a2b;
    margin-bottom: 4px;
  }
  header p { color: #a07c54; font-size: 13px; }

  .card {
    background: #fff;
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 4px 14px rgba(139, 90, 43, 0.08);
  }

  .month-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
    padding: 14px 18px;
    border-radius: 18px;
    margin-bottom: 14px;
    box-shadow: 0 4px 14px rgba(139, 90, 43, 0.08);
  }
  .month-bar button {
    background: #f5e6d3;
    border: none;
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    color: #8b5a2b;
  }
  .month-bar button:hover { background: #ecd5b8; }
  .month-bar .month-label {
    font-size: 18px;
    font-weight: 600;
    color: #8b5a2b;
  }

  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }
  .summary .item {
    background: #fff;
    padding: 14px 10px;
    border-radius: 14px;
    text-align: center;
    box-shadow: 0 4px 14px rgba(139, 90, 43, 0.08);
  }
  .summary .label { font-size: 12px; color: #a07c54; margin-bottom: 4px; }
  .summary .value { font-size: 18px; font-weight: 700; }
  .income { color: #2d8659; }
  .expense { color: #c04848; }
  .balance.pos { color: #2d8659; }
  .balance.neg { color: #c04848; }

  .section-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
    color: #6b4a2b;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* form */
  .type-toggle {
    display: flex;
    background: #f5e6d3;
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 12px;
  }
  .type-toggle button {
    flex: 1;
    border: none;
    padding: 8px;
    background: transparent;
    cursor: pointer;
    font-size: 14px;
    color: #8b5a2b;
    border-radius: 8px;
    font-weight: 500;
  }
  .type-toggle button.active {
    background: #fff;
    box-shadow: 0 2px 6px rgba(139,90,43,0.15);
    font-weight: 600;
  }

  .form-row { margin-bottom: 12px; }
  .form-row label {
    display: block;
    font-size: 12px;
    color: #a07c54;
    margin-bottom: 4px;
  }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ecd5b8;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    background: #fdfaf5;
    color: #4a3829;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
    outline: none;
    border-color: #c89968;
  }

  .pay-options {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .pay-options button {
    padding: 10px;
    border: 1px solid #ecd5b8;
    background: #fdfaf5;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    color: #6b4a2b;
  }
  .pay-options button.active {
    border-color: #c89968;
    background: #fff5e7;
    font-weight: 600;
  }

  .installment-box {
    background: #fff5e7;
    border-radius: 10px;
    padding: 10px 12px;
    margin-top: 8px;
    display: none;
  }
  .installment-box.show { display: block; }
  .installment-box .info {
    font-size: 12px;
    color: #8b5a2b;
    margin-top: 6px;
  }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .submit-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #c89968 0%, #a87a48 100%);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
  }
  .submit-btn:hover { opacity: 0.92; }

  /* records list */
  .records { max-height: 480px; overflow-y: auto; }
  .record {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 4px;
    border-bottom: 1px dashed #f0e0c8;
  }
  .record:last-child { border-bottom: none; }
  .record .left { flex: 1; }
  .record .cat {
    font-size: 14px;
    font-weight: 600;
    color: #4a3829;
    margin-bottom: 2px;
  }
  .record .meta {
    font-size: 11px;
    color: #a07c54;
  }
  .record .amt {
    font-size: 15px;
    font-weight: 700;
    margin-left: 8px;
  }
  .record .del {
    background: transparent;
    border: none;
    color: #c08484;
    margin-left: 8px;
    cursor: pointer;
    font-size: 16px;
    padding: 4px 6px;
  }
  .badge {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 10px;
    background: #f5e6d3;
    color: #8b5a2b;
    margin-right: 4px;
  }
  .badge.install { background: #ffe1c4; color: #b56a1e; }

  .empty {
    text-align: center;
    padding: 30px 10px;
    color: #c0a585;
    font-size: 13px;
  }

  /* breakdown */
  .breakdown-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    font-size: 14px;
    color: #6b4a2b;
    border-bottom: 1px dashed #f0e0c8;
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-row .b-amt { font-weight: 600; }

  .data-tools {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }
  .data-tools button {
    flex: 1;
    padding: 9px;
    background: #f5e6d3;
    border: none;
    border-radius: 10px;
    color: #8b5a2b;
    cursor: pointer;
    font-size: 13px;
  }
  .data-tools button:hover { background: #ecd5b8; }
  .data-tools .danger { color: #c04848; background: #fce4e4; }
  .data-tools .danger:hover { background: #f5cfcf; }

  @media (max-width: 480px) {
    .summary .value { font-size: 16px; }
    .pay-options { grid-template-columns: 1fr 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>🐻 我的記帳本</h1>
    <p>記下每一筆，掌握收支平衡</p>
  </header>

  <!-- 月份選擇 -->
  <div class="month-bar">
    <button id="prevMonth">‹</button>
    <div class="month-label" id="monthLabel">2026 / 05</div>
    <button id="nextMonth">›</button>
  </div>

  <!-- 月度總覽 -->
  <div class="summary">
    <div class="item">
      <div class="label">收入</div>
      <div class="value income" id="sumIncome">$0</div>
    </div>
    <div class="item">
      <div class="label">支出</div>
      <div class="value expense" id="sumExpense">$0</div>
    </div>
    <div class="item">
      <div class="label">結餘</div>
      <div class="value balance" id="sumBalance">$0</div>
    </div>
  </div>

  <!-- 新增記帳 -->
  <div class="card">
    <div class="section-title">✏️ 新增一筆</div>

    <div class="type-toggle">
      <button id="btnExpense" class="active" data-type="expense">支出</button>
      <button id="btnIncome" data-type="income">收入</button>
    </div>

    <div class="row-2">
      <div class="form-row">
        <label>金額</label>
        <input type="number" id="amount" placeholder="0" min="0" step="1">
      </div>
      <div class="form-row">
        <label>日期</label>
        <input type="date" id="date">
      </div>
    </div>

    <div class="form-row">
      <label>類別</label>
      <select id="category">
        <!-- 支出類別 -->
        <optgroup label="支出" id="expenseCats">
          <option value="飲食">🍱 飲食</option>
          <option value="交通">🚇 交通</option>
          <option value="購物">🛍️ 購物</option>
          <option value="娛樂">🎮 娛樂</option>
          <option value="居住">🏠 居住</option>
          <option value="醫療">💊 醫療</option>
          <option value="教育">📚 教育</option>
          <option value="人情">🎁 人情</option>
          <option value="其他">📌 其他</option>
        </optgroup>
        <optgroup label="收入" id="incomeCats" style="display:none">
          <option value="薪資">💼 薪資</option>
          <option value="獎金">🎉 獎金</option>
          <option value="投資">📈 投資</option>
          <option value="副業">💡 副業</option>
          <option value="其他收入">💰 其他</option>
        </optgroup>
      </select>
    </div>

    <div class="form-row" id="payMethodRow">
      <label>支付方式</label>
      <div class="pay-options">
        <button data-pay="cash" class="active">💵 現金</button>
        <button data-pay="mobile">📱 行動支付</button>
        <button data-pay="credit">💳 信用卡</button>
      </div>

      <div class="installment-box" id="installmentBox">
        <div class="row-2">
          <div class="form-row" style="margin-bottom:0">
            <label>分期月數</label>
            <select id="installment">
              <option value="1">不分期</option>
              <option value="3">3 期</option>
              <option value="6">6 期</option>
              <option value="12">12 期</option>
              <option value="24">24 期</option>
            </select>
          </div>
          <div class="form-row" style="margin-bottom:0">
            <label>每期金額</label>
            <input type="text" id="perMonth" disabled value="$0">
          </div>
        </div>
        <div class="info" id="installmentInfo"></div>
      </div>
    </div>

    <div class="form-row">
      <label>備註 (選填)</label>
      <input type="text" id="note" placeholder="e.g. 午餐 / 加油 / 訂閱費">
    </div>

    <button class="submit-btn" id="saveBtn">儲存</button>
  </div>

  <!-- 本月明細 -->
  <div class="card">
    <div class="section-title">📋 本月明細</div>
    <div class="records" id="records"></div>
  </div>

  <!-- 支付方式統計 -->
  <div class="card">
    <div class="section-title">📊 支出分類統計</div>
    <div id="breakdown"></div>
  </div>

  <!-- 資料管理 -->
  <div class="card">
    <div class="section-title">⚙️ 資料管理</div>
    <div class="data-tools">
      <button id="exportBtn">📤 匯出 JSON</button>
      <button id="importBtn">📥 匯入 JSON</button>
      <button id="clearBtn" class="danger">🗑️ 清空</button>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none">
  </div>

</div>

<script>
// ===== 資料 =====
let records = JSON.parse(localStorage.getItem('bk_records') || '[]');
let currentDate = new Date();
let currentType = 'expense';
let currentPay = 'cash';

function save() {
  localStorage.setItem('bk_records', JSON.stringify(records));
}

function formatMoney(n) {
  return '$' + Math.round(n).toLocaleString();
}

function ymKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

// ===== 月份切換 =====
function updateMonthLabel() {
  document.getElementById('monthLabel').textContent =
    currentDate.getFullYear() + ' / ' + String(currentDate.getMonth() + 1).padStart(2, '0');
  render();
}
document.getElementById('prevMonth').onclick = () => {
  currentDate.setMonth(currentDate.getMonth() - 1);
  updateMonthLabel();
};
document.getElementById('nextMonth').onclick = () => {
  currentDate.setMonth(currentDate.getMonth() + 1);
  updateMonthLabel();
};

// ===== 類型切換 =====
document.querySelectorAll('.type-toggle button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.type-toggle button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentType = b.dataset.type;

    // 切換類別選單
    document.getElementById('expenseCats').style.display = currentType === 'expense' ? '' : 'none';
    document.getElementById('incomeCats').style.display = currentType === 'income' ? '' : 'none';
    const sel = document.getElementById('category');
    sel.value = currentType === 'expense' ? '飲食' : '薪資';

    // 收入隱藏支付方式
    document.getElementById('payMethodRow').style.display = currentType === 'expense' ? '' : 'none';
  };
});

// ===== 支付方式 =====
document.querySelectorAll('.pay-options button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.pay-options button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentPay = b.dataset.pay;
    document.getElementById('installmentBox').classList.toggle('show', currentPay === 'credit');
    updateInstallment();
  };
});

// ===== 分期計算 =====
function updateInstallment() {
  const amt = parseFloat(document.getElementById('amount').value) || 0;
  const m = parseInt(document.getElementById('installment').value) || 1;
  const per = amt / m;
  document.getElementById('perMonth').value = formatMoney(per);
  const info = document.getElementById('installmentInfo');
  if (m > 1 && amt > 0) {
    info.textContent = `將分 ${m} 個月攤提，每月計入支出 ${formatMoney(per)}`;
  } else {
    info.textContent = '';
  }
}
document.getElementById('amount').addEventListener('input', updateInstallment);
document.getElementById('installment').addEventListener('change', updateInstallment);

// ===== 儲存 =====
document.getElementById('saveBtn').onclick = () => {
  const amt = parseFloat(document.getElementById('amount').value);
  const date = document.getElementById('date').value;
  if (!amt || amt <= 0) { alert('請輸入金額'); return; }
  if (!date) { alert('請選擇日期'); return; }

  const rec = {
    id: Date.now() + '-' + Math.random().toString(36).slice(2, 6),
    type: currentType,
    amount: amt,
    date: date,
    category: document.getElementById('category').value,
    note: document.getElementById('note').value.trim(),
    pay: currentType === 'expense' ? currentPay : null,
    installment: (currentType === 'expense' && currentPay === 'credit')
      ? parseInt(document.getElementById('installment').value) : 1
  };
  records.push(rec);
  save();

  // 清空表單
  document.getElementById('amount').value = '';
  document.getElementById('note').value = '';
  document.getElementById('installment').value = '1';
  updateInstallment();
  render();
};

// ===== 計算每月支出（含分期攤提）=====
function getMonthlyImpact(record, targetDate) {
  // 回傳這筆 record 在 targetDate 那個月份的金額影響
  // 收入：日期當月計入
  // 一般支出：日期當月計入
  // 信用卡分期：從日期月份開始，連續 N 個月每月攤提
  const recDate = new Date(record.date);
  const target = new Date(targetDate.getFullYear(), targetDate.getMonth(), 1);
  const startMonth = new Date(recDate.getFullYear(), recDate.getMonth(), 1);

  const monthDiff = (target.getFullYear() - startMonth.getFullYear()) * 12 +
                    (target.getMonth() - startMonth.getMonth());

  if (record.type === 'expense' && record.pay === 'credit' && record.installment > 1) {
    if (monthDiff >= 0 && monthDiff < record.installment) {
      return record.amount / record.installment;
    }
    return 0;
  } else {
    return monthDiff === 0 ? record.amount : 0;
  }
}

// ===== 渲染 =====
function render() {
  const yKey = currentDate.getFullYear();
  const mKey = currentDate.getMonth();

  let income = 0, expense = 0;
  const breakdown = {};

  // 本月所有「影響」這個月的記錄（含分期）
  const monthItems = [];
  records.forEach(r => {
    const impact = getMonthlyImpact(r, currentDate);
    if (impact > 0) {
      if (r.type === 'income') income += impact;
      else {
        expense += impact;
        breakdown[r.category] = (breakdown[r.category] || 0) + impact;
      }
    }
    // 顯示在明細中：日期落在本月
    const recDate = new Date(r.date);
    if (recDate.getFullYear() === yKey && recDate.getMonth() === mKey) {
      monthItems.push(r);
    }
  });

  // 摘要
  document.getElementById('sumIncome').textContent = formatMoney(income);
  document.getElementById('sumExpense').textContent = formatMoney(expense);
  const bal = income - expense;
  const balEl = document.getElementById('sumBalance');
  balEl.textContent = formatMoney(bal);
  balEl.className = 'value balance ' + (bal >= 0 ? 'pos' : 'neg');

  // 明細
  const list = document.getElementById('records');
  if (monthItems.length === 0) {
    list.innerHTML = '<div class="empty">本月還沒有任何紀錄 🌱</div>';
  } else {
    monthItems.sort((a, b) => b.date.localeCompare(a.date));
    list.innerHTML = monthItems.map(r => {
      const payMap = { cash: '💵 現金', mobile: '📱 行動支付', credit: '💳 信用卡' };
      const payBadge = r.type === 'expense' ? `<span class="badge">${payMap[r.pay] || ''}</span>` : '';
      const installBadge = (r.installment > 1) ? `<span class="badge install">分${r.installment}期</span>` : '';
      const sign = r.type === 'income' ? '+' : '-';
      const color = r.type === 'income' ? 'income' : 'expense';
      const noteText = r.note ? ` · ${r.note}` : '';
      return `
        <div class="record">
          <div class="left">
            <div class="cat">${r.category}</div>
            <div class="meta">${r.date}${noteText}<br>${payBadge}${installBadge}</div>
          </div>
          <div class="amt ${color}">${sign}${formatMoney(r.amount)}</div>
          <button class="del" data-id="${r.id}" title="刪除">✕</button>
        </div>`;
    }).join('');
    list.querySelectorAll('.del').forEach(btn => {
      btn.onclick = () => {
        if (confirm('確定要刪除這筆記錄嗎？')) {
          records = records.filter(x => x.id !== btn.dataset.id);
          save();
          render();
        }
      };
    });
  }

  // 分類統計
  const bd = document.getElementById('breakdown');
  const cats = Object.entries(breakdown).sort((a, b) => b[1] - a[1]);
  if (cats.length === 0) {
    bd.innerHTML = '<div class="empty">本月還沒有支出</div>';
  } else {
    const total = cats.reduce((s, [, v]) => s + v, 0);
    bd.innerHTML = cats.map(([c, v]) => {
      const pct = (v / total * 100).toFixed(1);
      return `<div class="breakdown-row">
        <span>${c} <span style="color:#b59574;font-size:12px">(${pct}%)</span></span>
        <span class="b-amt expense">${formatMoney(v)}</span>
      </div>`;
    }).join('');
  }
}

// ===== 資料管理 =====
document.getElementById('exportBtn').onclick = () => {
  const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `bookkeeping-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
};

document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
document.getElementById('importFile').onchange = (e) => {
  const f = e.target.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw 0;
      if (confirm(`匯入 ${data.length} 筆資料？將與現有資料合併。`)) {
        records = records.concat(data);
        save(); render();
      }
    } catch { alert('檔案格式錯誤'); }
  };
  reader.readAsText(f);
};

document.getElementById('clearBtn').onclick = () => {
  if (confirm('確定要清空所有資料嗎？這個動作無法復原。')) {
    records = []; save(); render();
  }
};

// ===== 初始化 =====
document.getElementById('date').value = new Date().toISOString().slice(0, 10);
updateMonthLabel();
</script>
</body>
</html>
